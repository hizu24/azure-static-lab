<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Azure Static Lab</title>
</head>
<body>
  <h1>Azure Static Web Apps の練習</h1>
  <p>これは Entra ID・Azure・アクセス制御を理解するための練習サイトです。</p>

  <hr>

  <h2>ページ一覧</h2>
  <ul>
    <li><a href="/public.html">公開ページ：誰でも見られる</a></li>
    <li><a href="/member.html">ログイン済みユーザー用ページ：ログイン済みだけ</a></li>
    <li><a href="/admin.html">管理者用ページ：admin ロールだけ</a></li>
  </ul>

  <hr>

  <h2>ログイン中のユーザー情報</h2>
  <pre id="user-info">読み込み中...</pre>

  <p><a href="/.auth/logout">ログアウト</a></p>

  <script>
    async function loadUserInfo() {
      const response = await fetch('/.auth/me');
      const data = await response.json();

      document.getElementById('user-info').textContent =
        JSON.stringify(data, null, 2);
    }

    loadUserInfo();
  </script>
</body>
</html>
